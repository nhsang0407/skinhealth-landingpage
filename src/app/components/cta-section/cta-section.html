<section class="section cta-section" id="contact">
  <div class="container">
    <div class="cta-content">
      <h2 class="section-title">Sẵn sàng phát triển thương hiệu của bạn?</h2>
      <p class="section-subtitle">
        Liên hệ ngay để nhận tư vấn miễn phí và báo giá chi tiết từ chuyên gia của chúng tôi
      </p>
      <div class="cta-buttons">

        <!-- CTA 1 -->
        <a 
          routerLink="/odm" 
          class="btn btn-secondary btn-lg"
          (click)="trackCTA('click_odm_service', 'ODM/OEM Service Button')"
        >
          <i class="fas fa-handshake"></i>
          Tìm hiểu dịch vụ ODM/OEM
        </a>

        <!-- CTA 2 -->
        <a 
          href="#newsletter" 
          class="btn btn-outline-white btn-lg"
          (click)="trackCTA('click_consultation_booking', 'Consultation Booking Button')"
        >
          <i class="fas fa-phone-alt"></i>
          Đặt lịch tư vấn
        </a>

      </div>
    </div>
  </div>
</section>
